<form class="eskie-recommended-modules-container">
    <header class="eskie-world-scripts-header">
        <div class="eskie-header-icon">
            <i class="fa-solid fa-puzzle-piece"></i>
        </div>
        <div class="eskie-header-text">
            <h2>Combat Numbers Debug</h2>
            <p class="notes">Displaying active system information for debugging</p>
        </div>
    </header>

    <hr />

    <div class="eskie-recommended-modules-scroll-area">
        <div class="eskie-category-group">
            <div class="eskie-category-header">
                <i class="fa-solid fa-gamepad"></i>
                <h3>Active System Information</h3>
            </div>
            <div class="eskie-recommended-modules-list">
                <div class="eskie-module-card active">
                    <div class="eskie-card-icon-wrapper">
                        <i class="fa-solid fa-dice-d20"></i>
                    </div>
                    <div class="eskie-card-details">
                        <div class="eskie-card-title-row">
                            <h3 class="eskie-card-title">{{systemTitle}} ({{systemId}})</h3>
                        </div>
                        <p class="eskie-card-description">System Version: {{systemVersion}}</p>
                    </div>
                    <div class="eskie-card-status-wrapper">
                        <span class="eskie-status-badge active">
                            <i class="fa-solid fa-check-circle"></i> Active
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="eskie-world-scripts-footer">
        <button type="submit" name="submit" class="eskie-btn-primary">
            <i class="fa-solid fa-check"></i> Close
        </button>
    </footer>
</form>
